superType: "base:structured"
abstract: false
final: false
allowChildContent: true
displayName:
  text: "RSS page"
  i18n: "contentType.rss.displayName"
description:
  text: "Page to display RSS feeds in correct format"
  i18n: "contentType.rss.description"
form:
- type: "TextLine"
  name: "title"
  label:
    text: "Title"
    i18n: "texts.common.title"
  occurrences:
    min: 1
    max: 1
- type: "ComboBox"
  name: "updatePeriod"
  label:
    text: "Update period"
    i18n: "contentType.rss.updatePeriod"
  occurrences:
    min: 0
    max: 1
  options:
  - value: "hourly"
    label: "Hourly"
  - value: "daily"
    label: "Daily"
  - value: "weekly"
    label: "Weekly"
  - value: "monthly"
    label: "Monthly"
  - value: "yearly"
    label: "Yearly"
- type: "TextLine"
  name: "updateFrequency"
  label:
    text: "Update frequency"
    i18n: "contentType.rss.updateFrequency"
  occurrences:
    min: 0
    max: 1
- type: "ContentSelector"
  name: "postsFolder"
  label:
    text: "Folder"
    i18n: "contentType.rss.folder"
  occurrences:
    min: 0
    max: 0
  attributes:
    relationshipType: "system:reference"
  allowContentType:
  - "base:folder"
