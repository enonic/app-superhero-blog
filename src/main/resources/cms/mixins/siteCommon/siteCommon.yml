displayName:
  text: "Blog config"
  i18n: "xData.siteCommon.displayName"
form:
- type: "ImageSelector"
  name: "backgroundImage"
  label:
    text: "Background image"
    i18n: "xData.siteCommon.backgroundImage"
  occurrences:
    min: 0
    max: 1
- type: "HtmlArea"
  name: "footerText"
  label:
    text: "Footer text"
    i18n: "xData.siteCommon.footerText"
  occurrences:
    min: 0
    max: 1
  exclude: "*"
  include: "Bold Italic Underline | JustifyLeft JustifyCenter JustifyRight JustifyBlock\
    \ | SpecialChar Anchor Link Unlink"
- type: "RadioButton"
  name: "commentSort"
  label:
    text: "Sort comments"
    i18n: "xData.siteCommon.commentSort"
  occurrences:
    min: 1
    max: 1
  options:
  - value: "ASC"
    label:
      i18n: "xData.siteCommon.commentSort.asc"
      text: "Oldest first"
  - value: "DESC"
    label:
      i18n: "xData.siteCommon.commentSort.desc"
      text: "Newest first"
  default: "DESC"
