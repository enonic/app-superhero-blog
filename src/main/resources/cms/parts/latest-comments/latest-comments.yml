displayName:
  text: "Latest comments"
  i18n: "part.latestComments.displayName"
description:
  text: "Displays the latest comments from all the blog posts"
  i18n: "part.latestComments.description"
form:
- type: "TextLine"
  name: "headline"
  label:
    text: "Title"
    i18n: "texts.common.title"
  helpText:
    text: "Override the headline text displayed on this part. Default: \"Latest comments\""
    i18n: "part.latestComments.title.helpText"
  occurrences:
    min: 0
    max: 1
  default: "Latest comments"
- type: "Long"
  name: "size"
  label:
    text: "Number of comments to display"
    i18n: "part.latestComments.size"
  helpText:
    text: "Override the max number of latest comments to display. Default: 5"
    i18n: "part.latestComments.size.helpText"
  occurrences:
    min: 0
    max: 1
  min: 1
  max: 20
  default: 5
